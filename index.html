<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voyagr — AI Travel Planner</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- HERO / FORM SECTION -->
  <section class="hero" id="hero">
    <div class="hero-bg">
      <div class="orb orb1"></div>
      <div class="orb orb2"></div>
      <div class="orb orb3"></div>
      <div class="grid-overlay"></div>
    </div>

    <header class="site-header">
      <div class="logo">Voyagr</div>
      <div class="tagline">AI-Powered Travel Planning</div>
    </header>

    <div class="hero-content">
      <h1 class="hero-title">
        Your perfect trip,<br/>
        <em>planned in seconds.</em>
      </h1>
      <p class="hero-subtitle">Tell us where you want to go. Claude AI handles the rest — itineraries, hotels, budget, and more.</p>

      <div class="form-card" id="form-card">
        <div class="form-grid">

          <div class="form-group full-width">
            <label>Where are you going?</label>
            <div class="autocomplete-wrap">
              <input type="text" id="destination" placeholder="e.g. Kyoto, Japan" autocomplete="off" />
              <ul class="autocomplete-list" id="autocomplete-list"></ul>
            </div>
          </div>

          <div class="form-group">
            <label>Departure Date</label>
            <input type="date" id="start-date" />
          </div>

          <div class="form-group">
            <label>Return Date</label>
            <input type="date" id="end-date" />
          </div>

          <div class="form-group">
            <label>Travelers</label>
            <select id="travelers">
              <option value="1">Solo (1)</option>
              <option value="2" selected>Couple (2)</option>
              <option value="3">Small group (3–4)</option>
              <option value="5">Large group (5+)</option>
            </select>
          </div>

          <div class="form-group">
            <label>Budget (USD)</label>
            <select id="budget">
              <option value="budget">Budget — Under $1,000</option>
              <option value="moderate" selected>Moderate — $1,000–$3,000</option>
              <option value="comfort">Comfort — $3,000–$6,000</option>
              <option value="luxury">Luxury — $6,000+</option>
            </select>
          </div>

          <div class="form-group full-width">
            <label>Trip Vibe</label>
            <div class="vibe-grid">
              <button class="vibe-btn active" data-vibe="Cultural & Historical">🏛️ Cultural</button>
              <button class="vibe-btn" data-vibe="Adventure & Outdoors">🧗 Adventure</button>
              <button class="vibe-btn" data-vibe="Relaxation & Wellness">🧘 Relaxation</button>
              <button class="vibe-btn" data-vibe="Food & Nightlife">🍜 Food & Nightlife</button>
              <button class="vibe-btn" data-vibe="Family Friendly">👨‍👩‍👧 Family</button>
              <button class="vibe-btn" data-vibe="Romantic Getaway">💫 Romantic</button>
            </div>
          </div>

        </div>

        <button class="generate-btn" id="generate-btn" onclick="generateTrip()">
          <span class="btn-text">Plan My Trip</span>
          <span class="btn-icon">→</span>
        </button>

        <div class="error-msg" id="error-msg"></div>
      </div>
    </div>
  </section>

  <!-- LOADING STATE -->
  <section class="loading-section" id="loading-section" style="display:none;">
    <div class="loader-wrap">
      <div class="loader-orbs">
        <span></span><span></span><span></span>
      </div>
      <p class="loader-text" id="loader-text">Crafting your itinerary...</p>
    </div>
  </section>

  <!-- RESULTS SECTION -->
  <section class="results-section" id="results-section" style="display:none;">

    <div class="results-header">
      <div class="results-header-inner">
        <div>
          <div class="logo small">Voyagr</div>
          <h2 class="results-title" id="results-title">Your Trip to —</h2>
          <p class="results-meta" id="results-meta"></p>
        </div>
        <button class="new-trip-btn" onclick="resetApp()">← Plan Another Trip</button>
      </div>
    </div>

    <div class="results-body">

      <!-- TABS -->
      <div class="tabs" id="tabs">
        <button class="tab active" data-tab="itinerary">📅 Itinerary</button>
        <button class="tab" data-tab="hotels">🏨 Hotels & Restaurants</button>
        <button class="tab" data-tab="budget">💰 Budget</button>
        <button class="tab" data-tab="packing">🎒 Packing List</button>
      </div>

      <!-- TAB PANELS -->
      <div class="tab-content">
        <div class="tab-panel active" id="tab-itinerary">
          <div class="panel-inner" id="itinerary-content"></div>
        </div>
        <div class="tab-panel" id="tab-hotels">
          <div class="panel-inner" id="hotels-content"></div>
        </div>
        <div class="tab-panel" id="tab-budget">
          <div class="panel-inner" id="budget-content"></div>
        </div>
        <div class="tab-panel" id="tab-packing">
          <div class="panel-inner" id="packing-content"></div>
        </div>
      </div>

    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
